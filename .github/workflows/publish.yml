name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Test, build, and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm -r --filter @kanopee/core test

      - name: Build all packages
        run: pnpm -r --filter '!@canopy-ui/demo' build

      - name: Publish @kanopee/core
        run: pnpm publish --no-git-checks
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @canopy-ui/react
        run: pnpm publish --no-git-checks
        working-directory: packages/react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @canopy-ui/svelte
        run: pnpm publish --no-git-checks
        working-directory: packages/svelte
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @canopy-ui/vue
        run: pnpm publish --no-git-checks
        working-directory: packages/vue
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
